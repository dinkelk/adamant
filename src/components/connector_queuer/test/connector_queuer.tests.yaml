---
description: This is a unit test suite for the Connector Queuer.
tests:
  - name: Test_Queued_Call
    description: This unit test invokes the async connector and makes sure the arguments are passed through asynchronously, as expected.
  - name: Test_Full_Queue
    description: This unit test fills the queue and makes sure that dropped messages are reported.
  - name: Test_Multiple_Drops
    description: This unit test fills the queue and drops multiple messages in succession, verifying the event count matches the number of drops.
  - name: Test_Partial_Dispatch
    description: This unit test exercises Dispatch_N to verify correct FIFO ordering under incremental partial dequeue.
