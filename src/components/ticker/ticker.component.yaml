---
description: >
  Active component that generates periodic Tick.T messages at a fixed rate
  determined by the period_us discriminant. Uses absolute-time scheduling
  (delay until) to prevent drift accumulation. The first tick fires
  immediately upon the initial cycle, and subsequent ticks are spaced
  exactly period_us microseconds apart.
execution: active
discriminant:
  description: The ticker component is instantiated with the desired tick period in microseconds.
  parameters:
    - name: period_us
      type: Positive
      description: The tick period in microseconds
connectors:
  - description: The sched send connection
    type: Tick.T
    kind: send
  - description: The system time is retrieved via this connector.
    return_type: Sys_Time.T
    kind: get
