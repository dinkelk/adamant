---
events:
  - name: Source_Not_Available
    description: A data product fetch resulted in a Not_Available status. The source data product was not available and was not copied to the destination.
    param_type: Product_Copier_Error_Info.T
  - name: Source_Id_Out_Of_Range
    description: A data product fetch resulted in an Id_Out_Of_Range status. The source ID was out of range and was not copied to the destination.
    param_type: Product_Copier_Error_Info.T
